<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Cascade</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <div id="game-cabinet">

      <canvas id="pachinball-canvas"></canvas>

      <div id="machine-head">
        </div>

      <div id="cabinet-divider"></div>

      <div id="ball-table"></div>

      <div id="hud">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item" id="best">Best: 0</div>
        <div class="hud-item" id="combo" style="display:none">Combo</div>
        <div class="hud-item">Balls: <span id="balls">1</span></div>
        <div class="hud-item" id="powerup" style="display:none">Power-up: <span id="powerup-name">—</span></div>
        <div class="hud-item" id="tilt" style="display:none">Tilted</div>
        <div class="hud-item">Lives: <span id="lives">3</span></div>
      </div>

      <div id="menu-overlay" class="overlay">
        <h1>NEXUS</h1>
        <div id="start-screen" class="screen">
          <p>Best: <span id="best-score-menu">0</span></p>
          <p>Left/Right Arrow to Flip</p>
          <p>Space to Launch</p>
          <button id="start-btn">Start Game</button>
          <button id="settings-btn">Settings</button>
        </div>
        <div id="game-over-screen" class="screen hidden">
          <h2>Game Over</h2>
          <p>Final Score: <span id="final-score">0</span></p>
          <p>Best Score: <strong id="best-score-final">0</strong></p>
          <button id="restart-btn">Play Again</button>
        </div>
      </div>

      <div id="pause-overlay" class="overlay hidden">
        <div class="screen">
          <h2>Paused</h2>
          <p>Press <strong>P</strong> to resume</p>
        </div>
      </div>

      <div id="settings-overlay" class="overlay hidden">
        <div class="settings-panel">
          <h2>Settings</h2>
          
          <label class="setting-row">
            <input type="checkbox" id="reduced-motion">
            <span>Reduced Motion</span>
            <small>Disables camera shake and smooth animations</small>
          </label>
          
          <label class="setting-row">
            <input type="checkbox" id="photosensitive-mode">
            <span>Photosensitive Mode</span>
            <small>Removes all flashing and strobe effects</small>
          </label>
          
          <label class="setting-row range-row">
            <span>Camera Shake</span>
            <input type="range" id="shake-intensity" min="0" max="0.10" step="0.01">
          </label>
          
          <h3 style="margin-top: 1.5rem; color: #00d9ff; border-bottom: 1px solid #333; padding-bottom: 0.5rem;">Audio</h3>
          
          <label class="setting-row range-row">
            <span>Master Volume</span>
            <input type="range" id="master-volume" min="0" max="1" step="0.05" value="0.8">
          </label>
          
          <label class="setting-row range-row">
            <span>Music Volume</span>
            <input type="range" id="music-volume" min="0" max="1" step="0.05" value="0.6">
          </label>
          
          <label class="setting-row range-row">
            <span>SFX Volume</span>
            <input type="range" id="sfx-volume" min="0" max="1" step="0.05" value="0.9">
          </label>
          
          <label class="setting-row">
            <input type="checkbox" id="mute-audio">
            <span>Mute All</span>
            <small>Temporarily silence all audio</small>
          </label>
          
          <div class="settings-buttons">
            <button id="save-settings">Save</button>
            <button id="close-settings">Cancel</button>
          </div>
        </div>
      </div>

      <div id="touch-controls">
        <button class="touch-btn" id="touch-left">◀</button>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
          <button class="touch-btn" id="touch-plunger">⬤</button>
          <button class="touch-btn" id="touch-nudge">Nudge</button>
        </div>
        <button class="touch-btn" id="touch-right">▶</button>
      </div>

      <div id="map-selector">
        <div class="map-hint" title="Press M to cycle">M</div>
        <button class="map-btn" data-map="neon-helix" title="Neon Helix">1</button>
        <button class="map-btn" data-map="cyber-core" title="Cyber Core">2</button>
        <button class="map-btn" data-map="quantum-grid" title="Quantum Grid">3</button>
        <button class="map-btn" data-map="singularity-well" title="Singularity Well">4</button>
        <button class="map-btn" data-map="glitch-spire" title="Glitch Spire">5</button>
        <button class="map-btn" data-map="matrix-core" title="Matrix Core">6</button>
        <button class="map-btn" data-map="cyan-void" title="Cyan Void">7</button>
        <button class="map-btn" data-map="magenta-dream" title="Magenta Dream">8</button>
      </div>

    </div>

    <div id="controls-hint">Controls — Left/Right: Flippers &nbsp;|&nbsp; Space: Launch &nbsp;|&nbsp; P: Pause &nbsp;|&nbsp; R: Reset</div>

    <div id="power-toast" class="toast hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
