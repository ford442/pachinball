# Optional native C++ physics tests + WASM build verification.
#
# This workflow is NON-BLOCKING (continue-on-error) until main CI (#283) lands.
# It does not gate merges.
#
# Skip triggers:
#   - Use workflow_dispatch only (disable push/PR triggers) for manual runs
#   - Commit message containing "[skip wasm-ci]" skips the wasm_build job
#
# Local equivalents:
#   npm run test:native          # Catch2 + ctest (g++/cmake only)
#   npm run build:wasm           # Emscripten Release → public/wasm/ (production)
#   npm run build:wasm:assert    # RelWithAsserts → native/build-assert/
#   WASM_MODULE_PATH=native/build-assert/PhysicsModule.js npm run test:wasm-parity

name: Native Physics (optional)

on:
  workflow_dispatch:
  push:
    paths:
      - 'native/**'
      - 'scripts/build-wasm.sh'
      - 'scripts/run-wasm-parity.mjs'
      - '.github/workflows/native-physics.yml'
  pull_request:
    paths:
      - 'native/**'
      - 'scripts/build-wasm.sh'
      - 'scripts/run-wasm-parity.mjs'
      - '.github/workflows/native-physics.yml'

jobs:
  native_ctest:
    name: Native CTest
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Run native Catch2 tests
        run: npm run test:native

  wasm_build:
    name: WASM Build
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ !contains(github.event.head_commit.message, '[skip wasm-ci]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-${{ runner.os }}-latest

      - name: Install and activate Emscripten
        run: |
          if [ ! -d emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          echo "$(pwd)" >> $GITHUB_PATH
          emcc --version

      - name: Build WASM module (Release — production path)
        run: |
          source emsdk/emsdk_env.sh
          if ! command -v emcmake &>/dev/null; then
            echo "Emscripten (emcmake) not available — failing WASM job explicitly"
            exit 1
          fi
          npm run build:wasm

      - name: Assert Release WASM artefact exists
        run: |
          test -s public/wasm/PhysicsModule.wasm
          test -s public/wasm/PhysicsModule.js
          # Production must not ship source maps
          test ! -e public/wasm/PhysicsModule.wasm.map
          test ! -e public/wasm/PhysicsModule.js.map
          echo "WASM size: $(wc -c < public/wasm/PhysicsModule.wasm) bytes"

      - name: Build RelWithAsserts artefact
        run: |
          source emsdk/emsdk_env.sh
          npm run build:wasm:assert
          test -s native/build-assert/PhysicsModule.wasm
          test -s native/build-assert/PhysicsModule.js

      - name: Install Node deps for parity
        run: npm ci

      - name: Install cmake/g++ for native reference
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: WASM parity against RelWithAsserts
        run: |
          source emsdk/emsdk_env.sh
          WASM_MODULE_PATH=native/build-assert/PhysicsModule.js npm run test:wasm-parity
